name: ci

# Test on every push and PR. Build + publish the Docker image only on
# pushes to `main` and on tag pushes `v*`. The image is tagged:
#   - `latest` on main
#   - `1.2.3` on tag `v1.2.3` (semver, v-prefix stripped)
#   - `sha-abcdef0` on every push (short commit SHA for pinning)

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  # PAI-121: keyless signing via GitHub's OIDC token + sigstore. The
  # cosign step on tag pushes signs the published image and attaches
  # the CycloneDX SBOMs as attestations.
  id-token: write
  # PAI-195: provenance attestations are a first-class release artifact.
  attestations: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Backend — vet + test
        working-directory: backend
        run: |
          go vet ./...
          go test -count=1 ./...

      - name: Backend — security invariants
        working-directory: backend
        run: go test -count=1 -run '^TestRegression_|^TestAuthzFuzz_' ./handlers/...

      - name: Anchor index — verify dogfood anchors
        working-directory: backend
        run: go run ./cmd/paimos anchors verify --repo-root .. --index ../.pmo/anchors.json

      - name: Frontend — typecheck + test
        working-directory: frontend
        run: |
          npm ci
          npm run typecheck
          npm test

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: govulncheck (Go vulnerability scan)
        working-directory: backend
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: gosec (Go SAST)
        working-directory: backend
        continue-on-error: true
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -fmt=text -severity=medium -confidence=medium \
            -exclude=G104 \
            -exclude-dir=cmd/genreport \
            ./...

      - name: npm audit (frontend production deps)
        working-directory: frontend
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high

  docker:
    if: github.event_name == 'push'
    needs: [test, security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Bake the correct __APP_VERSION__ into the SPA so the sidebar footer
      # matches the image tag. vite.config.ts reads ../VERSION at build time;
      # on tag pushes we sync it to the git tag, on main we append -dev+<sha>.
      - name: Sync VERSION to git ref
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v="$(cat VERSION)-dev+${GITHUB_SHA:0:7}"
          fi
          printf '%s\n' "$v" > VERSION
          echo "baked VERSION=$v"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short

      - name: Compute SOURCE_DATE_EPOCH
        id: sde
        run: |
          ts=$(git log -1 --format=%ct)
          echo "epoch=$ts" >> "$GITHUB_OUTPUT"
          echo "SOURCE_DATE_EPOCH=$ts"

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SOURCE_DATE_EPOCH=${{ steps.sde.outputs.epoch }}

      # PAI-121: SBOM + signed release. Run only on tag pushes — main
      # builds keep the existing latest/sha tags untouched, and the
      # heavy work (cyclonedx + cosign + sigstore) only runs when a
      # real release is being cut.
      - name: SBOM — Go (cyclonedx-gomod)
        if: github.ref_type == 'tag'
        working-directory: backend
        run: |
          # Run via `go run` so we don't depend on a third-party
          # GitHub Action; matches what scripts/sbom.sh does locally.
          go run github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest \
            app -licenses -json -output ../backend.sbom.json -main .
      - name: SBOM — npm (cyclonedx-npm)
        if: github.ref_type == 'tag'
        working-directory: frontend
        run: |
          npm ci
          npx --yes @cyclonedx/cyclonedx-npm \
            --output-format JSON --output-file ../frontend.sbom.json
      - name: Upload SBOMs to release artifacts
        if: github.ref_type == 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.ref_name }}
          path: |
            backend.sbom.json
            frontend.sbom.json
      - uses: sigstore/cosign-installer@v3
        if: github.ref_type == 'tag'
      - name: Cosign — sign image (keyless via GitHub OIDC)
        if: github.ref_type == 'tag'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ghcr.io/${{ github.repository }}
        run: |
          # Sign every meta tag we just pushed by digest so the
          # signature pins the immutable manifest, not a moving label.
          for tag in $(echo "${{ steps.meta.outputs.tags }}"); do
            cosign sign --yes "$tag@$DIGEST"
          done
      - name: Cosign — attach SBOM attestations
        if: github.ref_type == 'tag'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ghcr.io/${{ github.repository }}
        run: |
          cosign attest --yes --predicate backend.sbom.json \
            --type cyclonedx "$IMAGE@$DIGEST"
          cosign attest --yes --predicate frontend.sbom.json \
            --type cyclonedx "$IMAGE@$DIGEST"
      - name: Attest build provenance
        if: github.ref_type == 'tag'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
