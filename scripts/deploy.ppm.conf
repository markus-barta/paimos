# ppm — pm.barta.cm (personal instance on csb1)
# csb1 is reached over its Tailscale IP directly: MagicDNS is off on this
# tailnet (permanent — it caused API/automation resolution failures), so the
# `csb1.ts.barta.cm` name does NOT resolve. Use the stable Tailscale IP +
# explicit port instead of an ssh-config alias. Tailscale IPs (100.64.0.0/10,
# CGNAT) are non-routable outside the tailnet, so this is not sensitive.
SSH_TARGET=mba@100.64.0.4
SSH_PORT=2222
SSH_AUTH=key

COMPOSE_DIR=/home/mba/Code/nixcfg/hosts/csb1/docker
SERVICE=ppm
CONTAINER=ppm

STORAGE=volume
VOLUME_NAME=csb1_ppm_data

DB_FILENAME=ppm.db
BACKUP_ROOT=/home/mba/paimos-backups/ppm
INSTANCE_URL=https://pm.barta.cm
