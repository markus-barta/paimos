name: mirror-apple-secrets

# PAI-99: one-shot copier — mirrors the 5 Apple Developer secrets
# already in this repo (bp-esc) to a sibling repo (markus-barta/paimos
# by default) without ever decrypting them on a developer's laptop.
#
# Drop this file in `bytepoets-mba/bp-esc/.github/workflows/`,
# add a `MIRROR_PAT` secret (a fine-scoped PAT with secrets:write on
# the TARGET repo), then run once:
#
#   gh workflow run mirror-apple-secrets -R bytepoets-mba/bp-esc
#
# After the run succeeds, delete `MIRROR_PAT` and this file. The five
# secrets now live in the target repo's encrypted secret store with
# the same names + values, ready for `release.yml` to use.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "owner/repo to mirror secrets into"
        required: true
        default: "markus-barta/paimos"

permissions: {}

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror 5 Apple secrets to ${{ inputs.target }}
        env:
          # gh CLI auth — must be a PAT with secrets:write on TARGET.
          # bp-esc's default GITHUB_TOKEN can't write to other-owner repos.
          GH_TOKEN: ${{ secrets.MIRROR_PAT }}

          # Source values — read from THIS repo's secret store. GitHub
          # masks them in logs automatically.
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID:                   ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}

          TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "❌ MIRROR_PAT secret is empty — set a PAT with secrets:write on $TARGET first"
            exit 1
          fi

          echo "→ verifying gh can see $TARGET"
          gh repo view "$TARGET" --json name,owner --jq '"\(.owner.login)/\(.name)"'

          # Loop the 5 names. Values come from the env above; --body-file -
          # reads from stdin so we never put the value in argv (avoids any
          # `ps` exposure on shared runners).
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD \
                      APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            echo "→ mirroring $name → $TARGET"
            printf '%s' "${!name}" | gh secret set "$name" \
              --repo "$TARGET" \
              --body-file -
          done

          echo "✓ mirrored 5 secrets — verify with: gh secret list -R $TARGET"
